<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Обратная связь</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 40px;
        max-width: 720px;
      }
      a { color: #0d6efd; }
      label {
        display: block;
        margin-top: 12px;
        margin-bottom: 6px;
        font-weight: 600;
      }
      input, textarea, button {
        width: 100%;
        box-sizing: border-box;
        padding: 10px;
        font-size: 16px;
      }
      textarea { min-height: 120px; resize: vertical; }
      button { margin-top: 16px; cursor: pointer; }
      .status {
        margin-top: 16px;
        padding: 12px;
        border-radius: 8px;
        background: #f5f5f5;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <p><a href="/">Все обращения</a></p>
    <h1>Обратная связь</h1>

    <form id="feedbackForm">
      <label for="name">Имя</label>
      <input id="name" name="name" type="text" maxlength="100" required />

      <label for="email">Почта</label>
      <input id="email" name="email" type="email" required />

      <label for="message">Сообщение</label>
      <textarea id="message" name="message" maxlength="5000" required></textarea>

      <button type="submit">Отправить</button>
    </form>

    <div id="status" class="status" style="display: none;"></div>

    <script>
      const form = document.getElementById("feedbackForm");
      const statusEl = document.getElementById("status");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        statusEl.style.display = "block";
        statusEl.textContent = "Отправляю...";

        const payload = {
          name: form.name.value,
          email: form.email.value,
          message: form.message.value,
        };

        try {
          const resp = await fetch("/api/feedback", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          const data = await resp.json();
          if (!resp.ok || !data.ok) {
            statusEl.textContent =
              "Ошибка отправки: " + (data.error || "unknown") + "\n" + JSON.stringify(data.details || {}, null, 2);
            return;
          }

          statusEl.textContent =
            "Спасибо! Сообщение сохранено.\nfeedbackId: " +
            data.feedbackId +
            "\nTelegram sent: " +
            data.telegramSent;
          window.location.href = "/";
        } catch (err) {
          statusEl.textContent = "Ошибка сети: " + String(err);
        }
      });
    </script>
  </body>
</html>
